{% extends "base.html" %}

{% block title %}Job Match{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
  <h1 class="page-title">Job Match</h1>
  <p class="page-subtitle">Search jobs by keyword.</p>

  <form method="POST">
    <div class="form-group">
      <input type="text" name="keyword" class="form-control" placeholder="Enter keyword (e.g., Python, Developer)" required>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary">Search</button>
    </div>
  </form>

  {% if results %}
  <div style="margin-top: 20px;">
    <h2>Results:</h2>
    <ul>
      {% for job in results %}
        <li>{{ job[0] }} ({{ job[1] }})</li>
      {% endfor %}
    </ul>
  </div>
  {% endif %}
</div>
{% endblock %}
