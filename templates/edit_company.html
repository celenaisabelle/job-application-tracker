{% extends "base.html" %}

{% block title %}Edit Company{% endblock %}

{% block content %}
<div class="card" style="max-width: 760px; margin: 0 auto;">
  <h1 class="page-title">Edit Company</h1>
  <p class="page-subtitle">Update the company information below.</p>

  <form method="POST">
    <div class="form-group">
      <label for="company_name">Company Name</label>
      <input type="text" id="company_name" name="company_name" class="form-control" value="{{ company[1] }}" required>
    </div>

    <div class="form-group">
      <label for="industry">Industry</label>
      <input type="text" id="industry" name="industry" class="form-control" value="{{ company[2] or '' }}">
    </div>

    <div class="form-group">
      <label for="website">Website</label>
      <input type="text" id="website" name="website" class="form-control" value="{{ company[3] or '' }}">
    </div>

    <div class="form-group">
      <label for="city">City</label>
      <input type="text" id="city" name="city" class="form-control" value="{{ company[4] or '' }}">
    </div>

    <div class="form-group">
      <label for="state">State</label>
      <input type="text" id="state" name="state" class="form-control" value="{{ company[5] or '' }}">
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" class="form-control">{{ company[6] or '' }}</textarea>
    </div>

    <div class="btn-row">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/companies" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
