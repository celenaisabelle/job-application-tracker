{% extends "base.html" %}

{% block title %}Edit Contact{% endblock %}

{% block content %}
<div class="card" style="max-width: 760px; margin: 0 auto;">
  <h1 class="page-title">Edit Contact</h1>
  <p class="page-subtitle">Update the contact information below.</p>

  <form method="POST">
    <div class="form-group">
      <label for="company_id">Company</label>
      <select id="company_id" name="company_id" class="form-control" required>
        {% for company in companies %}
          <option value="{{ company[0] }}" {% if company[0] == contact[1] %}selected{% endif %}>
            {{ company[1] }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="first_name">First Name</label>
      <input type="text" id="first_name" name="first_name" class="form-control" value="{{ contact[2] }}" required>
    </div>

    <div class="form-group">
      <label for="last_name">Last Name</label>
      <input type="text" id="last_name" name="last_name" class="form-control" value="{{ contact[3] }}" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" class="form-control" value="{{ contact[4] or '' }}">
    </div>

    <div class="form-group">
      <label for="phone">Phone</label>
      <input type="text" id="phone" name="phone" class="form-control" value="{{ contact[5] or '' }}">
    </div>

    <div class="form-group">
      <label for="job_title">Job Title</label>
      <input type="text" id="job_title" name="job_title" class="form-control" value="{{ contact[6] or '' }}">
    </div>

    <div class="btn-row">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/contacts" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
