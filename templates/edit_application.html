{% extends "base.html" %}

{% block title %}Edit Application{% endblock %}

{% block content %}
<div class="card" style="max-width: 760px; margin: 0 auto;">
  <h1 class="page-title">Edit Application</h1>
  <p class="page-subtitle">Update the application information below.</p>

  <form method="POST">
    <div class="form-group">
      <label for="job_id">Job</label>
      <select id="job_id" name="job_id" class="form-control" required>
        {% for job in jobs %}
          <option value="{{ job[0] }}" {% if job[0] == application[1] %}selected{% endif %}>
            {{ job[1] }} - {{ job[2] }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="application_date">Application Date</label>
      <input type="date" id="application_date" name="application_date" class="form-control" value="{{ application[2] }}" required>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <input type="text" id="status" name="status" class="form-control" value="{{ application[3] or '' }}">
    </div>

    <div class="form-group">
      <label for="resume_version">Resume Version</label>
      <input type="text" id="resume_version" name="resume_version" class="form-control" value="{{ application[4] or '' }}">
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" name="cover_letter_sent" {% if application[5] %}checked{% endif %}>
        Cover Letter Sent
      </label>
    </div>

    <div class="form-group">
      <label for="response_date">Response Date</label>
      <input type="date" id="response_date" name="response_date" class="form-control" value="{{ application[6] or '' }}">
    </div>

    <div class="form-group">
      <label for="interview_date">Interview Date</label>
      <input type="datetime-local" id="interview_date" name="interview_date" class="form-control" value="{{ application[7]|replace(' ', 'T') if application[7] else '' }}">
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" class="form-control">{{ application[8] or '' }}</textarea>
    </div>

    <div class="btn-row">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/applications" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
