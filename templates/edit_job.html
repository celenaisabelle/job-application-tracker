{% extends "base.html" %}

{% block title %}Edit Job{% endblock %}

{% block content %}
<div class="card" style="max-width: 760px; margin: 0 auto;">
  <h1 class="page-title">Edit Job</h1>
  <p class="page-subtitle">Update the job information below.</p>

  <form method="POST">
    <div class="form-group">
      <label for="company_id">Company</label>
      <select id="company_id" name="company_id" class="form-control" required>
        {% for company in companies %}
          <option value="{{ company[0] }}" {% if company[0] == job[1] %}selected{% endif %}>
            {{ company[1] }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="job_title">Job Title</label>
      <input type="text" id="job_title" name="job_title" class="form-control" value="{{ job[2] }}" required>
    </div>

    <div class="form-group">
      <label for="job_description">Job Description</label>
      <textarea id="job_description" name="job_description" class="form-control">{{ job[3] or '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="salary_min">Salary Min</label>
      <input type="number" step="0.01" id="salary_min" name="salary_min" class="form-control" value="{{ job[4] or '' }}">
    </div>

    <div class="form-group">
      <label for="salary_max">Salary Max</label>
      <input type="number" step="0.01" id="salary_max" name="salary_max" class="form-control" value="{{ job[5] or '' }}">
    </div>

    <div class="form-group">
      <label for="job_type">Job Type</label>
      <input type="text" id="job_type" name="job_type" class="form-control" value="{{ job[6] or '' }}">
    </div>

    <div class="form-group">
      <label for="posting_url">Posting URL</label>
      <input type="text" id="posting_url" name="posting_url" class="form-control" value="{{ job[7] or '' }}">
    </div>

    <div class="form-group">
      <label for="date_posted">Date Posted</label>
      <input type="date" id="date_posted" name="date_posted" class="form-control" value="{{ job[8] or '' }}">
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" name="is_active" {% if job[9] %}checked{% endif %}>
        Is Active
      </label>
    </div>

    <div class="btn-row">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/jobs" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
